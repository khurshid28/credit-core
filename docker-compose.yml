# Production compose — NOT used in local dev (dev runs against the local MySQL80).
# Subdomains: operator/moderator/director/admin.creditcore.uz + api.creditcore.uz
# nginx here serves plain HTTP on 127.0.0.1:8080; the SERVER's own proxy/panel
# terminates TLS on 80/443 and forwards the 5 subdomains to it.
# Usage: docker compose --env-file deploy/.env up -d --build
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: credit_core
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    # Not exposed to the host in prod — only the compose network reaches it.

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - deploy/.env
    environment:
      UPLOAD_DIR: /data/uploads
      BACKEND_PORT: 3000
    volumes:
      - uploads:/data/uploads
    depends_on:
      - mysql

  web-operator:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-operator, VITE_API_URL: "${VITE_API_URL:-https://api.creditcore.uz}" } }
    restart: unless-stopped
  web-moderator:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-moderator, VITE_API_URL: "${VITE_API_URL:-https://api.creditcore.uz}" } }
    restart: unless-stopped
  web-director:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-director, VITE_API_URL: "${VITE_API_URL:-https://api.creditcore.uz}" } }
    restart: unless-stopped
  web-admin:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-admin, VITE_API_URL: "${VITE_API_URL:-https://api.creditcore.uz}" } }
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # The server already runs its own reverse proxy / panel on 80 + 443 (it terminates
    # TLS). So this nginx only does plain HTTP and is published on 8080 — binding 80/443
    # here would error ("address already in use"). Loopback-only: the host proxy reaches
    # it at 127.0.0.1:8080. To expose it directly for testing, use '8080:80' instead.
    ports:
      - '127.0.0.1:8080:80'
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web-operator
      - web-moderator
      - web-director
      - web-admin

volumes:
  mysql_data:
  uploads:
