# Reverse proxy for credit-core — api + 4 role subdomains, HTTP-only on :80.
# This container is published on 127.0.0.1:8080. The SERVER's own proxy / panel owns
# 80 + 443, terminates TLS, and forwards each subdomain here — so there is no TLS or
# ACME in this file. Web builds bake VITE_API_URL=https://api.creditcore.uz.

map $host $web_upstream {
    operator.creditcore.uz   web-operator;
    moderator.creditcore.uz  web-moderator;
    director.creditcore.uz   web-director;
    admin.creditcore.uz      web-admin;
}

# ── api.creditcore.uz → NestJS backend ─────────────────────────────────────
server {
    listen 80;
    server_name api.creditcore.uz;

    client_max_body_size 25m;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # The front proxy terminates TLS; pass its scheme through (defaults empty → backend treats as http).
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}

# ── operator/moderator/director/admin → role web apps (static) ──────────────
server {
    listen 80;
    server_name operator.creditcore.uz moderator.creditcore.uz director.creditcore.uz admin.creditcore.uz;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://$web_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
